<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; background: #1a1a1a; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const playerIdle = new Image(); playerIdle.src = 'player_idle.png';
    const playerWalks = [new Image(), new Image(), new Image()];
    playerWalks[0].src = 'player_walk_1.png'; playerWalks[1].src = 'player_walk_2.png'; playerWalks[2].src = 'player_walk_3.png';
    const enemy1Walks = [new Image(), new Image(), new Image()];
    enemy1Walks[0].src = 'enemy1_1.png'; enemy1Walks[1].src = 'enemy1_2.png'; enemy1Walks[2].src = 'enemy1_3.png';
    const enemy2Walks = [new Image(), new Image(), new Image()];
    enemy2Walks[0].src = 'enemy2_1.png'; enemy2Walks[1].src = 'enemy2_2.png'; enemy2Walks[2].src = 'enemy2_3.png';
    const bossWalks = [new Image(), new Image(), new Image()];
    bossWalks[0].src = 'boss_1.png'; bossWalks[1].src = 'boss_2.png'; bossWalks[2].src = 'boss_3.png';

    let isGameStarted = false, isGameOver = false, deathMessage = "";
    const bullets = [], enemies = [], keys = {};
    let score = 0;
    const player = { x: canvas.width/2, y: canvas.height/2, size: 64, speed: 5, isMoving: false, frame: 0, dir: 1 };

    window.addEventListener('keydown', (e) => keys[e.code] = true);
    window.addEventListener('keyup', (e) => keys[e.code] = false);

    function getWeaponStats() {
        if (score >= 20000) return { speed: 30, pierce: true, size: 20, color: 'gold' };
        if (score >= 10000) return { speed: 25, pierce: true, size: 15, color: 'purple' };
        if (score >= 6000)  return { speed: 20, pierce: true, size: 15, color: 'blue' };
        if (score >= 3000)  return { speed: 15, pierce: true, size: 10, color: 'red' };
        if (score >= 1000)  return { speed: 15, pierce: false, size: 10, color: 'yellow' };
        return { speed: 10, pierce: false, size: 10, color: 'white' };
    }

    window.addEventListener('mousedown', (e) => {
        if (!isGameStarted || isGameOver) {
            if (e.clientX > canvas.width/2 - 110 && e.clientX < canvas.width/2 + 110 &&
                e.clientY > canvas.height/2 - 50 && e.clientY < canvas.height/2 + 50) {
                isGameStarted = true; isGameOver = false; score = 0; enemies.length = 0; bullets.length = 0;
                player.x = canvas.width/2; player.y = canvas.height/2; spawnEnemy();
            }
        } else if (!player.isMoving) {
            let stats = getWeaponStats();
            const angle = Math.atan2(e.clientY - player.y, e.clientX - player.x);
            bullets.push({ x: player.x, y: player.y, dx: Math.cos(angle) * stats.speed, dy: Math.sin(angle) * stats.speed, pierce: stats.pierce, size: stats.size, color: stats.color });
        }
    });

    function spawnEnemy() {
        if (!isGameOver) {
            if (score >= 100000 && !enemies.find(e => e.type === 3)) {
                enemies.push({ x: canvas.width/2, y: -100, frame: 0, type: 3, hp: 100 });
            } else if (score < 100000) {
                let spawnCount = (score > 5000) ? 2 : 1; 
                for (let i = 0; i < spawnCount; i++) {
                    let side = Math.floor(Math.random() * 4);
                    let x, y;
                    if (side === 0) { x = Math.random() * canvas.width; y = -50; }
                    else if (side === 1) { x = Math.random() * canvas.width; y = canvas.height + 50; }
                    else if (side === 2) { x = -50; y = Math.random() * canvas.height; }
                    else { x = canvas.width + 50; y = Math.random() * canvas.height; }
                    enemies.push({ x: x, y: y, frame: 0, type: Math.random() > 0.7 ? 2 : 1 });
                }
            }
            setTimeout(spawnEnemy, Math.max(300, 2000 - (score / 50)));
        }
    }

    function update() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        if (!isGameStarted) {
            ctx.fillStyle = 'white'; ctx.textAlign = 'center'; ctx.font = '40px Arial';
            ctx.fillText("두 쫜득이들을 물리쳐라!", canvas.width/2, canvas.height/2 - 150);
            ctx.font = '20px Arial'; ctx.fillText("규칙: 움직일 땐 쏠 수 없고, 멈춰있을 때만 사격 가능!", canvas.width/2, canvas.height/2 - 100);
            ctx.font = '50px Arial'; ctx.fillText("START", canvas.width/2, canvas.height/2 + 20);
            ctx.strokeRect(canvas.width/2 - 110, canvas.height/2 - 50, 220, 100);
        } else if (isGameOver) {
            ctx.fillStyle = 'white'; ctx.textAlign = 'center';
            ctx.font = '30px Arial'; ctx.fillText(deathMessage, canvas.width/2, canvas.height/2 - 80);
            ctx.font = '50px Arial'; ctx.fillText("RETRY", canvas.width/2, canvas.height/2 + 20);
            ctx.strokeRect(canvas.width/2 - 110, canvas.height/2 - 50, 220, 100);
        } else {
            let moveSpeed = (score >= 20000) ? 8 : 5;
            player.isMoving = (keys['ArrowLeft'] || keys['KeyA'] || keys['ArrowRight'] || keys['KeyD'] || keys['ArrowUp'] || keys['KeyW'] || keys['ArrowDown'] || keys['KeyS']);
            if (keys['ArrowLeft'] || keys['KeyA']) { player.x -= moveSpeed; player.dir = -1; }
            if (keys['ArrowRight'] || keys['KeyD']) { player.x += moveSpeed; player.dir = 1; }
            if (keys['ArrowUp'] || keys['KeyW']) player.y -= moveSpeed;
            if (keys['ArrowDown'] || keys['KeyS']) player.y += moveSpeed;

            player.frame += 0.1; ctx.save(); ctx.translate(player.x, player.y);
            if (player.dir === -1) ctx.scale(-1, 1);
            let pImg = player.isMoving ? playerWalks[Math.floor(player.frame) % 3] : playerIdle;
            ctx.drawImage(pImg, -32, -32, 64, 64); ctx.restore();

            enemies.forEach((e) => {
                e.frame += 0.08;
                const angle = Math.atan2(player.y - e.y, player.x - e.x);
                let speed = (e.type === 3) ? 0.5 : (e.type === 2 ? 0.8 : 1.5);
                e.x += Math.cos(angle) * speed; e.y += Math.sin(angle) * speed;
                
                let size = (e.type === 3) ? 128 : 64;
                let imgs = (e.type === 3) ? bossWalks : (e.type === 2 ? enemy2Walks : enemy1Walks);
                ctx.drawImage(imgs[Math.floor(e.frame) % 3], e.x - size/2, e.y - size/2, size, size);
                
                if (Math.hypot(player.x - e.x, player.y - e.y) < size/2) {
                    isGameOver = true;
                    deathMessage = (e.type === 3) ? "최종 보스에게 당했다!" : (e.type === 2 ? "먹물 쫜득볼한테 당했다!" : "두쫜득볼한테 당했다!");
                }
            });

            bullets.forEach((b, bi) => {
                b.x += b.dx; b.y += b.dy;
                ctx.fillStyle = b.color; ctx.fillRect(b.x, b.y, b.size, b.size);
                enemies.forEach((e, ei) => {
                    if (Math.hypot(b.x - e.x, b.y - e.y) < (e.type === 3 ? 64 : 30)) {
                        if (e.type === 3) {
                            e.hp -= 1;
                            if (e.hp <= 0) { enemies.splice(ei, 1); score += 50000; }
                        } else {
                            enemies.splice(ei, 1); score += (e.type === 2 ? 500 : 100);
                        }
                        if (!b.pierce) bullets.splice(bi, 1);
                    }
                });
            });
            ctx.fillStyle = 'white'; ctx.font = '20px Arial';
            ctx.fillText("Score: " + score, 20, 30);
            ctx.fillText("Lv: " + (score >= 20000 ? 6 : score >= 10000 ? 5 : score >= 6000 ? 4 : score >= 3000 ? 3 : score >= 1000 ? 2 : 1), 20, 60);
        }
        requestAnimationFrame(update);
    }
    update();
</script>
</body>
</html>
