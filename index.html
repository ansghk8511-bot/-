<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; background: #1a1a1a; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // 이미지 로드
    const playerIdle = new Image(); playerIdle.src = 'player_idle.png';
    const playerWalks = [new Image(), new Image(), new Image()];
    playerWalks[0].src = 'player_walk_1.png'; playerWalks[1].src = 'player_walk_2.png'; playerWalks[2].src = 'player_walk_3.png';
    const enemy1Walks = [new Image(), new Image(), new Image()];
    enemy1Walks[0].src = 'enemy1_1.png'; enemy1Walks[1].src = 'enemy1_2.png'; enemy1Walks[2].src = 'enemy1_3.png';
    const enemy2Walks = [new Image(), new Image(), new Image()];
    enemy2Walks[0].src = 'enemy2_1.png'; enemy2Walks[1].src = 'enemy2_2.png'; enemy2Walks[2].src = 'enemy2_3.png';
    const bossWalks = [new Image(), new Image(), new Image()];
    bossWalks[0].src = 'boss_1.png'; bossWalks[1].src = 'boss_2.png'; bossWalks[2].src = 'boss_3.png';

    let isGameStarted = false, isGameOver = false, deathMessage = "";
    let score = 0, currentZone = 0;
    const bullets = [], enemies = [], keys = {};
    const player = { x: canvas.width/2, y: canvas.height/2, speed: 5, isMoving: false, frame: 0, dir: 1 };

    window.addEventListener('keydown', (e) => keys[e.code] = true);
    window.addEventListener('keyup', (e) => keys[e.code] = false);

    function getWeaponStats() {
        if (score >= 20000) return { speed: 30, pierce: true, size: 20, color: 'gold' };
        return { speed: 10, pierce: false, size: 10, color: 'white' };
    }

    window.addEventListener('mousedown', (e) => {
        if (!isGameStarted || isGameOver) {
            if (e.clientX > canvas.width/2 - 110 && e.clientX < canvas.width/2 + 110 &&
                e.clientY > canvas.height/2 - 50 && e.clientY < canvas.height/2 + 50) {
                isGameStarted = true; isGameOver = false; score = 0; currentZone = 0; enemies.length = 0; bullets.length = 0;
                player.x = canvas.width/2; player.y = canvas.height/2; spawnEnemy();
            }
        } else if (!player.isMoving) {
            let stats = getWeaponStats();
            // [수정완료] 플레이어는 화면 중앙에 고정되어 있으므로, 
            // 화면 중앙(centerX, centerY)을 기준으로 마우스 위치와의 각도를 계산합니다.
            const angle = Math.atan2(e.clientY - (canvas.height / 2), e.clientX - (canvas.width / 2));
            
            bullets.push({ 
                x: player.x, 
                y: player.y, 
                dx: Math.cos(angle) * stats.speed, 
                dy: Math.sin(angle) * stats.speed, 
                pierce: stats.pierce, 
                size: stats.size, 
                color: stats.color 
            });
        }
    });

    function spawnEnemy() {
        if (!isGameOver && isGameStarted) {
            let spawnCount = 1 + Math.floor(currentZone / 2); 
            for (let i = 0; i < spawnCount; i++) {
                let x = player.x + 600 + Math.random() * 400;
                let y = player.y + (Math.random() - 0.5) * 800;
                enemies.push({ x: x, y: y, frame: 0, type: Math.random() > 0.7 ? 2 : 1 });
            }
            setTimeout(spawnEnemy, Math.max(300, 2000 - (score / 50)));
        }
    }

    function update() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        if (!isGameStarted) {
            ctx.fillStyle = 'white'; ctx.textAlign = 'center'; ctx.font = '40px Arial';
            ctx.fillText("두 쫜득이를 물리쳐라!" canvas.width/2, canvas.height/2 - 150);
            ctx.font = '50px Arial'; ctx.fillText("START", canvas.width/2, canvas.height/2 + 20);
            ctx.strokeRect(canvas.width/2 - 110, canvas.height/2 - 50, 220, 100);
        } else if (isGameOver) {
            ctx.fillStyle = 'white'; ctx.textAlign = 'center';
            ctx.font = '30px Arial'; ctx.fillText(deathMessage, canvas.width/2, canvas.height/2 - 80);
            ctx.fillText("RETRY", canvas.width/2, canvas.height/2 + 20);
            ctx.strokeRect(canvas.width/2 - 110, canvas.height/2 - 50, 220, 100);
        } else {
            // 플레이어 이동
            if (keys['ArrowLeft'] || keys['KeyA']) { player.x -= 5; player.dir = -1; player.isMoving = true; }
            else if (keys['ArrowRight'] || keys['KeyD']) { player.x += 5; player.dir = 1; player.isMoving = true; }
            else if (keys['ArrowUp'] || keys['KeyW']) { player.y -= 5; player.isMoving = true; }
            else if (keys['ArrowDown'] || keys['KeyS']) { player.y += 5; player.isMoving = true; }
            else player.isMoving = false;

            currentZone = Math.floor(player.x / 2000);
            let camX = player.x - canvas.width/2;
            let camY = player.y - canvas.height/2;

            // 플레이어 그리기
            player.frame += 0.1; ctx.save(); ctx.translate(canvas.width/2, canvas.height/2);
            if (player.dir === -1) ctx.scale(-1, 1);
            let pImg = player.isMoving ? playerWalks[Math.floor(player.frame) % 3] : playerIdle;
            if (pImg.complete) ctx.drawImage(pImg, -32, -32, 64, 64);
            else { ctx.fillStyle = 'red'; ctx.fillRect(-32, -32, 64, 64); }
            ctx.restore();

            // 적 그리기
            enemies.forEach((e, ei) => {
                if (e.x < player.x - 1000) { enemies.splice(ei, 1); return; }
                e.frame += 0.08;
                const angle = Math.atan2(player.y - e.y, player.x - e.x);
                e.x += Math.cos(angle) * 1.2; e.y += Math.sin(angle) * 1.2;
                let img = enemy1Walks[Math.floor(e.frame) % 3];
                if (img.complete) ctx.drawImage(img, e.x - camX - 32, e.y - camY - 32, 64, 64);
                else { ctx.fillStyle = 'red'; ctx.fillRect(e.x - camX - 32, e.y - camY - 32, 64, 64); }
                
                if (Math.hypot(player.x - e.x, player.y - e.y) < 32) { isGameOver = true; deathMessage = "당했다!"; }
            });

            // 총알 그리기
            bullets.forEach((b, bi) => {
                b.x += b.dx; b.y += b.dy;
                ctx.fillStyle = b.color; ctx.fillRect(b.x - camX, b.y - camY, b.size, b.size);
                enemies.forEach((e, ei) => {
                    if (Math.hypot(b.x - e.x, b.y - e.y) < 30) {
                        enemies.splice(ei, 1); score += 100;
                        if (!b.pierce) bullets.splice(bi, 1);
                    }
                });
            });

            ctx.fillStyle = 'white'; ctx.font = '20px Arial';
            ctx.fillText("Score: " + score + " | Zone: " + currentZone, 150, 30);
        }
        requestAnimationFrame(update);
    }
    update();
</script>
</body>
</html>
