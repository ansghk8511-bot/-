<!DOCTYPE html>
<html>
<head>
    <style> body { margin: 0; background: #1a1a1a; overflow: hidden; } canvas { display: block; } </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

    // 이미지 로드 (필요시 경로 확인)
    const playerIdle = new Image(); playerIdle.src = 'player_idle.png';
    const playerWalks = [new Image(), new Image(), new Image()]; // ... (이미지 로드 생략)
    
    let isGameStarted = false, isGameOver = false, currentScreen = 'HOME';
    let camera = { x: 0, y: 0 };
    let player = { x: 0, y: 0, speed: 5, frame: 0, dir: 1, isMoving: false };
    const bullets = [], enemies = [], keys = {};
    let score = 0, totalScore = 0;

    window.addEventListener('keydown', (e) => keys[e.code] = true);
    window.addEventListener('keyup', (e) => keys[e.code] = false);

    window.addEventListener('mousedown', (e) => {
        if (currentScreen === 'HOME') {
            if (e.clientX > canvas.width/2 - 120 && e.clientX < canvas.width/2 + 120) {
                if (e.clientY > canvas.height/2 + 50 && e.clientY < canvas.height/2 + 130) {
                    currentScreen = 'GAME'; isGameStarted = true; player.x = 0; player.y = 0;
                }
            }
        } else if (currentScreen === 'GAME' && !player.isMoving) {
            const angle = Math.atan2(e.clientY - canvas.height/2, e.clientX - canvas.width/2);
            bullets.push({ x: player.x, y: player.y, dx: Math.cos(angle) * 10, dy: Math.sin(angle) * 10 });
        }
    });

    function spawnEnemy() {
        if (currentScreen === 'GAME' && !isGameOver) {
            let angle = Math.random() * Math.PI * 2;
            let dist = 800;
            enemies.push({ x: player.x + Math.cos(angle) * dist, y: player.y + Math.sin(angle) * dist, type: 1 });
            setTimeout(spawnEnemy, 1000);
        }
    }

    function update() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (currentScreen === 'HOME') {
            ctx.fillStyle = '#2c3e50'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'white'; ctx.textAlign = 'center'; ctx.font = '80px Arial';
            ctx.fillText("무한 쫜득 월드", canvas.width/2, canvas.height/2 - 100);
            ctx.fillStyle = '#e74c3c'; ctx.fillRect(canvas.width/2 - 120, canvas.height/2 + 50, 240, 80);
            ctx.fillStyle = 'white'; ctx.font = '40px Arial'; ctx.fillText("START", canvas.width/2, canvas.height/2 + 105);
        } else if (currentScreen === 'GAME') {
            // 카메라 따라가기
            camera.x = player.x - canvas.width / 2;
            camera.y = player.y - canvas.height / 2;

            // 배경 격자 (무한 맵 느낌)
            ctx.strokeStyle = '#333';
            for (let i = -100; i < canvas.width + 100; i += 50) {
                ctx.beginPath(); ctx.moveTo(i - (camera.x % 50), 0); ctx.lineTo(i - (camera.x % 50), canvas.height); ctx.stroke();
            }
            for (let j = -100; j < canvas.height + 100; j += 50) {
                ctx.beginPath(); ctx.moveTo(0, j - (camera.y % 50)); ctx.lineTo(canvas.width, j - (camera.y % 50)); ctx.stroke();
            }

            // 플레이어 이동
            if (keys['ArrowUp']) player.y -= player.speed;
            if (keys['ArrowDown']) player.y += player.speed;
            if (keys['ArrowLeft']) player.x -= player.speed;
            if (keys['ArrowRight']) player.x += player.speed;

            // 플레이어 그리기 (중앙 고정)
            ctx.fillStyle = 'white';
            ctx.fillRect(canvas.width/2 - 32, canvas.height/2 - 32, 64, 64);

            // 적 그리기 (카메라 좌표 반영)
            enemies.forEach((e, i) => {
                ctx.fillStyle = 'red';
                ctx.fillRect(e.x - camera.x, e.y - camera.y, 64, 64);
                let angle = Math.atan2(player.y - e.y, player.x - e.x);
                e.x += Math.cos(angle) * 2; e.y += Math.sin(angle) * 2;
            });

            // 총알 그리기 (카메라 좌표 반영)
            bullets.forEach((b, i) => {
                b.x += b.dx; b.y += b.dy;
                ctx.fillStyle = 'yellow';
                ctx.fillRect(b.x - camera.x, b.y - camera.y, 10, 10);
            });
        }
        requestAnimationFrame(update);
    }
    spawnEnemy();
    update();
</script>
</body>
</html>
