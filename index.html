<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>쫜득이를 물리쳐라! - 최종 버전</title>
    <style>
        body { margin: 0; background: #1a1a1a; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // 이미지 로드
    const playerIdle = new Image(); playerIdle.src = 'player_idle.png';
    const playerWalks = [new Image(), new Image(), new Image()];
    playerWalks[0].src = 'player_walk_1.png'; playerWalks[1].src = 'player_walk_2.png'; playerWalks[2].src = 'player_walk_3.png';
    const enemy1Walks = [new Image(), new Image(), new Image()];
    enemy1Walks[0].src = 'enemy1_1.png'; enemy1Walks[1].src = 'enemy1_2.png'; enemy1Walks[2].src = 'enemy1_3.png';
    const enemy2Walks = [new Image(), new Image(), new Image()];
    enemy2Walks[0].src = 'enemy2_1.png'; enemy2Walks[1].src = 'enemy2_2.png'; enemy2Walks[2].src = 'enemy2_3.png';
    const bossWalks = [new Image(), new Image(), new Image()];
    bossWalks[0].src = 'boss_1.png'; bossWalks[1].src = 'boss_2.png'; bossWalks[2].src = 'boss_3.png';

    // 게임 상태 변수
    let isGameStarted = false, isGameOver = false, isGameCleared = false;
    let nextBossScore = 100000, score = 0, finalBossSpawned = false;
    let player = { x: 0, y: 0, frame: 0, dir: 1, level: 1, exp: 0, speed: 5, damage: 10, bulletSpeed: 15 };
    const bullets = [], enemies = [], keys = {};

    window.addEventListener('keydown', (e) => keys[e.code] = true);
    window.addEventListener('keyup', (e) => keys[e.code] = false);

    window.addEventListener('mousedown', (e) => {
        if (!isGameStarted) { isGameStarted = true; spawnEnemy(); }
        else if (!isGameOver && !isGameCleared) {
            const angle = Math.atan2(e.clientY - canvas.height/2, e.clientX - canvas.width/2);
            bullets.push({ x: player.x, y: player.y, dx: Math.cos(angle) * player.bulletSpeed, dy: Math.sin(angle) * player.bulletSpeed, damage: player.damage });
        }
    });

    function levelUpProcess(isBoss) {
        // 보스는 10만, 일반 몬스터는 200 경험치 획득
        player.exp += isBoss ? 100000 : 200;
        if (player.level < 50 && player.exp >= player.level * 2000) {
            player.level++;
            player.speed += 0.2;
            player.damage += 2;
            player.bulletSpeed += 1;
        }
    }

    function spawnEnemy() {
        if (isGameOver || isGameCleared || !isGameStarted) return;
        if (score >= 1000000 && !finalBossSpawned) {
            enemies.push({ x: player.x + 600, y: player.y, type: 4, hp: 100000, frame: 0 });
            finalBossSpawned = true;
        } else if (score < 1000000) {
            if (score >= nextBossScore) {
                enemies.push({ x: player.x + 600, y: player.y, type: 3, hp: 2000, frame: 0 });
                nextBossScore += 100000;
            } else {
                let angle = Math.random() * Math.PI * 2;
                enemies.push({ x: player.x + Math.cos(angle) * 800, y: player.y + Math.sin(angle) * 800, type: Math.random() > 0.7 ? 2 : 1 });
            }
        }
        setTimeout(spawnEnemy, Math.max(300, 2000 - (score / 2000)));
    }

    function update() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (!isGameStarted || isGameOver || isGameCleared) {
            ctx.fillStyle = 'white'; ctx.textAlign = 'center'; ctx.font = '40px Arial';
            ctx.fillText(isGameCleared ? "게임 클리어!" : (isGameOver ? "GAME OVER" : "쫜득이를 물리쳐라!"), canvas.width/2, canvas.height/2);
        } else {
            let moving = (keys['ArrowLeft'] || keys['KeyA'] || keys['ArrowRight'] || keys['KeyD'] || keys['ArrowUp'] || keys['KeyW'] || keys['ArrowDown'] || keys['KeyS']);
            if (moving) {
                player.frame += 0.2;
                if (keys['ArrowLeft'] || keys['KeyA']) { player.x -= player.speed; player.dir = -1; }
                if (keys['ArrowRight'] || keys['KeyD']) { player.x += player.speed; player.dir = 1; }
                if (keys['ArrowUp'] || keys['KeyW']) player.y -= player.speed;
                if (keys['ArrowDown'] || keys['KeyS']) player.y += player.speed;
            }
            let camX = player.x - canvas.width/2, camY = player.y - canvas.height/2;

            ctx.save(); ctx.translate(canvas.width/2, canvas.height/2);
            if (player.dir === -1) ctx.scale(-1, 1);
            ctx.drawImage(moving ? playerWalks[Math.floor(player.frame) % 3] : playerIdle, -32, -32, 64, 64);
            ctx.restore();

            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                e.frame = (e.frame || 0) + 0.1;
                const angle = Math.atan2(player.y - e.y, player.x - e.x);
                e.x += Math.cos(angle) * (e.type >= 3 ? 0.5 : 1.2); 
                e.y += Math.sin(angle) * (e.type >= 3 ? 0.5 : 1.2);
                
                if (Math.hypot(player.x - e.x, player.y - e.y) < (e.type >= 3 ? 60 : 30)) isGameOver = true;
                
                let img = (e.type >= 3) ? bossWalks[Math.floor(e.frame)%3] : (e.type === 2 ? enemy2Walks[Math.floor(e.frame)%3] : enemy1Walks[Math.floor(e.frame)%3]);
                ctx.drawImage(img, e.x - camX - 32, e.y - camY - 32, 64, 64);
                
                for (let bi = bullets.length - 1; bi >= 0; bi--) {
                    let b = bullets[bi];
                    if (Math.hypot(b.x - e.x, b.y - e.y) < 30) {
                        bullets.splice(bi, 1);
                        if (e.type >= 3) {
                            e.hp -= b.damage;
                            if (e.hp <= 0) { if (e.type === 4) isGameCleared = true; enemies.splice(i, 1); score += 1000; levelUpProcess(true); }
                        } else { enemies.splice(i, 1); score += 500; levelUpProcess(false); }
                        break;
                    }
                }
            }
            bullets.forEach(b => { b.x += b.dx; b.y += b.dy; ctx.fillStyle = 'yellow'; ctx.fillRect(b.x - camX, b.y - camY, 10, 10); });
            ctx.fillStyle = 'white'; ctx.fillText(`Score: ${score} | Level: ${player.level} | Bullet Speed: ${player.bulletSpeed}`, 50, 50);
        }
        requestAnimationFrame(update);
    }
    update();
</script>
</body>
</html>
