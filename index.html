<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; background: #1a1a1a; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // (이미지 로드 변수들은 동일하므로 생략)
    const playerIdle = new Image(); playerIdle.src = 'player_idle.png';
    const playerWalks = [new Image(), new Image(), new Image()]; // ... 생략 ...

    let isGameStarted = false, isGameOver = false, deathMessage = "";
    const bullets = [], enemies = [], keys = {};
    let score = 0;
    const player = { x: canvas.width/2, y: canvas.height/2, size: 64, speed: 5, isMoving: false, frame: 0, dir: 1 };

    window.addEventListener('keydown', (e) => keys[e.code] = true);
    window.addEventListener('keyup', (e) => keys[e.code] = false);

    window.addEventListener('mousedown', (e) => {
        if (!isGameStarted || isGameOver) {
            // 버튼 클릭 범위: x(중앙±120), y(중앙+50 ~ +130)
            if (e.clientX > canvas.width/2 - 120 && e.clientX < canvas.width/2 + 120 &&
                e.clientY > canvas.height/2 + 50 && e.clientY < canvas.height/2 + 130) {
                isGameStarted = true; isGameOver = false; score = 0; enemies.length = 0; bullets.length = 0;
                player.x = canvas.width/2; player.y = canvas.height/2; spawnEnemy();
            }
        } else if (!player.isMoving) {
            // (사격 로직 동일)
        }
    });

    function spawnEnemy() { /* (동일) */ }

    function update() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        if (!isGameStarted) {
            ctx.fillStyle = '#2c3e50'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#f1c40f'; ctx.textAlign = 'center'; ctx.font = 'bold 80px Arial';
            ctx.fillText("쫜득이들의 침공", canvas.width/2, canvas.height/2 - 100);
            ctx.fillStyle = 'white'; ctx.font = '25px Arial';
            ctx.fillText("멈춰서 쏘고, 움직여서 피하세요!", canvas.width/2, canvas.height/2 - 30);
            ctx.fillStyle = '#e74c3c';
            ctx.fillRect(canvas.width/2 - 120, canvas.height/2 + 50, 240, 80);
            ctx.fillStyle = 'white'; ctx.font = 'bold 40px Arial';
            ctx.fillText("START", canvas.width/2, canvas.height/2 + 105);
        } else if (isGameOver) {
            // (게임 오버 화면)
        } else {
            // (게임 플레이 로직)
        }
        requestAnimationFrame(update);
    }
    update();
</script>
</body>
</html>
